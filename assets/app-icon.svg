<?xml version="1.0" encoding="UTF-8"?>
<!--
  CyberWatch — Google Play Store listing icon
  Spec: 512 × 512 PNG, 32-bit with alpha, max 1 MB
  Export to PNG via: inkscape app-icon.svg -o app-icon.png -w 512 -h 512
  Or: magick app-icon.svg -resize 512x512 app-icon.png

  NOTE: Play Store applies its own rounded mask, so this SVG is
  drawn edge-to-edge. Don't add your own corner radius.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- Deep background gradient matching the feature graphic -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="50%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>

    <!-- Brand stroke gradient -->
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>

    <!-- Glow for the letters -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Corner bracket decoration (top-left) -->
  <path d="M 40 60 L 40 40 L 60 40"
        fill="none" stroke="#00d4ff" stroke-width="4" opacity="0.6"/>

  <!-- Corner bracket decoration (top-right) -->
  <path d="M 452 40 L 472 40 L 472 60"
        fill="none" stroke="#00d4ff" stroke-width="4" opacity="0.6"/>

  <!-- Corner bracket decoration (bottom-left) -->
  <path d="M 40 452 L 40 472 L 60 472"
        fill="none" stroke="#a855f7" stroke-width="4" opacity="0.6"/>

  <!-- Corner bracket decoration (bottom-right) -->
  <path d="M 452 472 L 472 472 L 472 452"
        fill="none" stroke="#a855f7" stroke-width="4" opacity="0.6"/>

  <!-- CW letters with glow -->
  <text x="256" y="340"
        font-family="Arial Black, 'Helvetica Neue', sans-serif"
        font-size="280"
        font-weight="900"
        fill="url(#brand)"
        text-anchor="middle"
        filter="url(#glow)">CW</text>

  <!-- Subtle watch glyph below the letters -->
  <text x="256" y="420"
        font-family="Consolas, 'Courier New', monospace"
        font-size="22"
        fill="#00d4ff"
        text-anchor="middle"
        opacity="0.6"
        letter-spacing="3">◈ INTEL ◈</text>
</svg>
